<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVP-3-by-3</title>
    <link rel="stylesheet" href="3-by-3-pvp.css">
</head>
<body>
    <header>Tic-Tac-Toe Game</header> 

    <main>

        <!--Roles-->
            <div class="info-container">
                <div>Draw 3 in a row</div>
                <div class="player-info-container">
                    <div class="player-1-div">
                        <div><img src="/images/user.png" class="user-img"></div>
                        <div>Player 1</div>
                        <div id="noughts-div">O</div>
                    </div>
                    <div class="player-2-div">
                        <div id="cross-div">X</div>
                        <div>Player 2</div>
                        <div><img src="/images/user.png" class="user-img"></div>
                    </div>
                </div>
            </div>
            <!---->
            
        <!--Game Field-->
        <div class="game-field">

            <!--Turn msg-->
            <div id="turn-msg">Player 1's Turn</div> 
            <!---->

            <!--Game Container-->
            <div class="game-container">
                <div class="game">
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                    <button class="box"></button>
                </div> 
            </div>
            <!---->


            <!--Buttons-->
            <div class="button-container">
                <div class="link"><button id="new-game-btn">New Game</button></div>
                <a href="/tic-tac-toe-game/mode-menu/mode-menu.html" class="link">
                    <button class="btns">TTT Menu</button></a>
                <a href="/home-page/home-page.html" class="link">
                    <button class="btns">Arcade Hub</button></a>
            </div>
            <!---->

        </div>
        <!---->
        
        <!--Message Container-->
        <div class="msg-container hide">
            <p class="msg"></p>
            <div class="msg-btns">
                <button id="cancel-btn">Cancel</button>
                <button id="play-again-btn">Play Again</button>
            </div>
        </div>
        <!---->

    </main>

    <script src="3-by-3-pvp.js"></script>
</body>
</html>
